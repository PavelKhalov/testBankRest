databaseChangeLog:
  - changeSet:
      id: 002-create-cards-table
      author: khalov
      changes:
        - createTable:
            tableName: cards
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: number
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: last_four_digits
                  type: varchar(4)
                  constraints:
                    nullable: false
              - column:
                  name: balance
                  type: numeric(9,2)
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: owner_id
                  type: uuid
                  constraints:
                    nullable: true
                    foreignKeyName: fk_cards_owner
                    references: users(id)
              - column:
                  name: expiration_date
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
